<div class="square"></div>

<!-- CSS -->
<style>
  .square {
    border-radius: 20px;
    margin: 0 auto;
    width: 830px;      /* Ширина */
    height: 100px;     /* Высота (такая же, как ширина) */

</style>

<style>
  /* Этот блок отвечает за эффект при наведении */
  .main-link:hover {
    transform: scale(1.1); /* Увеличение на 10% */

  }
</style>

<a href="./index2.html" class="main-link" style="
  display: inline-block;

  top: 22px; 
  left: 890px; 
  font-size: 30px; 
  border-radius: 50px; 
  background-color: #eee; 
  color: black;
  padding: 20px 50px;
  font-family: 'Geologica', sans-serif !important;
  font-weight: 700; 
  line-height: 1;
  /* Добавляем плавность анимации */
  transition: transform 0.3s ease, background-color 0.3s ease;
