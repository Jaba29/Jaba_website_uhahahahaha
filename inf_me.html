<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(31, 31, 31);
            font-family: 'Geologica', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            color: white;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .header-container {
            display: flex;
            justify-content: center;
            padding-top: 20px;
            position: relative;
        }

        .square {
            border-radius: 20px;
            width: 830px;
            height: 100px;
            background: rgb(143, 143, 143);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            text-align: center;
            font-size: 30px;
            border-radius: 50px;
            background-color: #eee;
            color: black;
            padding: 15px 45px;
            font-weight: 700;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .nav-link:hover {
            transform: scale(1.1);
            background-color: #ddd;
        }

        /* --- КОНТЕЙНЕР КАРТОЧЕК --- */
        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 50px;
            margin-left: 30px;
        }

        .inf-link {
            display: flex;
            align-items: center; /* Все в один ряд по центру */
            width: 700px;
            height: 150px; /* Уменьшил высоту для аккуратности */
            background: #444;
            border-radius: 50px;
            text-decoration: none;
            padding: 0 40px;
            box-sizing: border-box;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .inf-link:hover {
            transform: scale(1.03);
            background-color: #555;
        }

        .inf-img {
            width: 80px;
            margin-right: 30px;
        }

        .inf-text {
            color: white;
            font-size: 40px;
            font-weight: 700;
            flex-grow: 1; /* Растягивает текст, чтобы кнопка (i) ушла вправо */
        }

        /* --- КНОПКА ИНФОРМАЦИИ (i) --- */
        .info-icon {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .info-icon:hover {
            background: white;
            color: #333;
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Блюр фона */
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #222;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid white;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .close-btn {
            margin-top: 20px;
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Верхняя панель -->
    <div class="header-container">
        <div class="square">
            <a href="./index.html" class="nav-link">Главная</a>
            <a href="./meme.html" class="nav-link">Мемы</a>
            <a href="./index2.html" class="nav-link">Ссылки</a>
        </div>
    </div>
<body>

<!-- КОНТЕЙНЕР ДЛЯ КАРТОЧЕК (Добавь это в свой файл) -->
<div class="cards-wrapper">

    <!-- КАРТОЧКА: Zite -->
    <div class="inf-link" onclick="openProjectModal('Zite', '???')" style="margin-left: 840px;">
        <img src="./images/ghghghghghghg.png" alt="Icon" class="inf-img">
        <span class="inf-text">Zite</span>
        <!-- Кнопка i -->
        <div class="info-icon" onclick="event.stopPropagation(); openProjectModal('Zite', '???')">i</div>
    </div>

    <!-- КАРТОЧКА: Mililand -->
    <div class="inf-link" onclick="openProjectModal('Mililand', 'Мой майнкрафт сервер, на данный момент закрыт')" style="margin-left: 840px;">
        <img src="./images/1f431_3d.png" alt="Icon" class="inf-img">
        <span class="inf-text">Mililand</span>
        <div class="info-icon" onclick="event.stopPropagation(); openProjectModal('Mililand', 'Мой майнкрафт сервер, на данный момент закрыт')">i</div>
    </div>

</div>


<!-- МОДАЛЬНОЕ ОКНО (Оно одно на все карточки) -->
<div id="modalOverlay" class="modal-overlay" onclick="closeProjectModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="p-modal-title" style="margin-top: 0; font-size: 32px; color: azure;"></h2>
        <p id="p-modal-desc" style="font-size: 18px; line-height: 1.5; color: #ccc;"></p>
        <button class="close-btn" onclick="closeProjectModal()">Понятно</button>
    </div>
</div>

<script>
    function openProjectModal(title, description) {
        document.getElementById('p-modal-title').innerText = title;
        document.getElementById('p-modal-desc').innerText = description;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeProjectModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>



</body>


</html>
