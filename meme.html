<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaba - Мемы</title>
     <link rel="icon" href="./images/ппп.png" type="image/png">


    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: rgb(31, 31, 31);
            font-family: 'Geologica', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            color: white;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light-theme {
            background-color: #f5f5f5;
            color: #333;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: #555;
            border: 2px solid white;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }

        body.light-theme .theme-toggle {
            background: #fff;
            border-color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .header-container {
            display: flex;
            justify-content: center;
            padding-top: 20px;
            position: relative;
            padding-left: 15px;
            padding-right: 15px;
        }

        .square {
            border-radius: 20px;
            width: 100%;
            max-width: 830px;
            height: auto;
            min-height: 100px;
            background: rgb(143, 143, 143);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px;
            gap: 10px;
            transition: background-color 0.3s;
        }

        body.light-theme .square {
            background: #e0e0e0;
        }

        .nav-link {
            text-decoration: none;
            text-align: center;
            font-size: 30px;
            border-radius: 50px;
            background-color: #eee;
            color: black;
            padding: 15px 45px;
            font-weight: 700;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        body.light-theme .nav-link {
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-link:hover {
            transform: scale(1.1);
            background-color: #ddd;
        }

        .message-container {
            text-align: center;
            margin-top: 100px;
            padding: 0 20px;
        }

        .message-text {
            font-family: 'Geologica', sans-serif;
            color: #888;
            font-size: 50px;
            transition: color 0.3s;
        }

        body.light-theme .message-text {
            color: #999;
        }

        @media (max-width: 768px) {
            .nav-link {
                font-size: 20px;
                padding: 12px 25px;
            }

            .message-text {
                font-size: 36px;
            }

            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                font-size: 16px;
                padding: 10px 20px;
            }

            .message-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div class="header-container">
        <div class="square">
            <a href="./index.html" class="nav-link">Главная</a>
            <a href="./meme.html" class="nav-link">Мемы</a>
            <a href="./Liks.html" class="nav-link">Ссылки</a>
        </div>
    </div>

    <div class="message-container">
        <span class="message-text">
            Эта страница в разработке :(
        </span>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
    </script>

</body>
</html>
